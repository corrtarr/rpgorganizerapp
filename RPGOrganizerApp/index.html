<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Chronicle</title>
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <h1>The Chronicle</h1>
      <p class="subtitle">Campaign Organizer</p>
      <hr class="divider" />

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Enter the Chronicle</button>
        <p class="error-msg" id="errorMsg"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth } from '/src/js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from 'firebase/auth';

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = '/app.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        errorMsg.textContent = 'Invalid email or password. Try again.';
      }
    });
  </script>

</body>
</html>
